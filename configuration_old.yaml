# to use with automations
input_boolean:
  moviemode:
    name: Movie Mode
    initial: off
  videoinput:
    name: Vide Input
    initial: off
  audioinput:
    name: Audio Input
    initial: off
  stairs_switch_auto_on:
    name: "Stairs Light Turned On Automatically"
    initial: off


# influxdb:
#   host: 192.168.0.5
#   include:
#     domains:
#       - sensor

device_tracker:
  - platform: nmap_tracker
    hosts: 192.168.0.0/24
    consider_home: 1800
    exclude:
      - 192.168.0.99
      - 192.168.0.5
      - 192.168.0.10

switch:
  - platform: mqtt
    name: "Kitchen Light 01"
    state_topic: "stat/sw_kitchen_01/POWER"
    command_topic: "cmnd/sw_kitchen_01/POWER"
    availability_topic: "tele/sw_kitchen_01/LWT"
    payload_on: "ON"
    payload_off: "OFF"
    payload_available: "Online"
    payload_not_available: "Offline"
    retain: false

  - platform: mqtt
    name: Shelly Terrace Down
    state_topic: "shellies/shellyswitch25-98F4ABF36920/relay/0"
    command_topic: "shellies/shellyswitch25-98F4ABF36920/relay/0/command"
    payload_on: "on"
    payload_off: "off"
    retain: false

  - platform: mqtt
    name: Shelly Terrace Up
    state_topic: "shellies/shellyswitch25-98F4ABF36920/relay/1"
    command_topic: "shellies/shellyswitch25-98F4ABF36920/relay/1/command"
    payload_on: "on"
    payload_off: "off"
    retain: false
    
  - platform: mqtt
    name: Shelly TV
    state_topic: "shellies/shellyswitch25-8CAAB5059118/relay/0"
    command_topic: "shellies/shellyswitch25-8CAAB5059118/relay/0/command"
    payload_on: "on"
    payload_off: "off"
    retain: false

  - platform: mqtt
    name: Shelly TV Side
    state_topic: "shellies/shellyswitch25-8CAAB5059118/relay/1"
    command_topic: "shellies/shellyswitch25-8CAAB5059118/relay/1/command"
    payload_on: "on"
    payload_off: "off"
    retain: false

  - platform: mqtt
    name: 'Screen'
    state_topic: 'rf_bridge/stat/RfCode'
    command_topic: 'rf_bridge/cmnd/Backlog'
    availability_topic: 'tele/rf_bridge/LWT'
    payload_available: 'Online'
    payload_not_available: 'Offline'
    payload_on: 'RfRaw AAB04D0508026C014A00C8008C10FEC081A081A0A0A08181A0A0A0A0A0A0A0A0A0A0A0A0A0A0A0A0A081A08181A0A0A0A081A08181A0A081A0A0A0A0A0A0A0A0A081A0A0A0A0818181818181A081B0A055;RfRaw 0'
    payload_off: 'RfRaw AAB04B04080276014000D210D6B081A081A0A0A08181A0A0A0A0A0A0A0A0A0A0A090A0A0A0A0A081908181A0A0A0A081A08181A0A081A0A0A0A0A0A0A0A0A0A0A0A081A0818181A081818181A0A055; RfRaw 0'
    optimistic: true

  - platform: mqtt
    name: 'Gate'
    # state_topic: 'rf_bridge2/stat/RfCode'
    command_topic: 'rf_bridge2/cmnd/Backlog'
    availability_topic: 'rf_bridge2/tele/LWT'
    payload_available: 'Online'
    payload_not_available: 'Offline'
    payload_on: 'RfRaw AAB0580404017C0EEC02E43CE63808080808080808080808081A0A08282A08282A082A0A0A0A082A082A0A0A0A0A082A0A082A0A0A082A0A0A082A082A0828282828282A082A0A0A08282A0A08282A0A0A0A0A0A0A0A082A0A0A0855'
    payload_off: 'RfRaw AAB0580404017C0EEC02E43CE63808080808080808080808081A0A08282A08282A082A0A0A0A082A082A0A0A0A0A082A0A082A0A0A082A0A0A082A082A0828282828282A082A0A0A08282A0A08282A0A0A0A0A0A0A0A082A0A0A0855'

  - platform: mqtt
    name: 'Garage Door'
    # state_topic: 'rf_bridge2/stat/RfCode'
    command_topic: 'rf_bridge2/cmnd/Backlog'
    availability_topic: 'rf_bridge2/tele/LWT'
    payload_available: 'Online'
    payload_not_available: 'Offline'
    payload_on: 'RfRaw AAB05A050401D601400F6E02EE4146481818180808080808080808283B083B083B08383B0B0B0B0B0B083B08383B0B0B083838383B0B08383B0B0B08383B0B08383B0B083B0B0B0B083B083B0B0B08383838383B083B0B0B0B083B0B0B55'
    payload_off: 'RfRaw AAB05A050401D601400F6E02EE4146481818180808080808080808283B083B083B08383B0B0B0B0B0B083B08383B0B0B083838383B0B08383B0B0B08383B0B08383B0B083B0B0B0B083B083B0B0B08383838383B083B0B0B0B083B0B0B55'

  - platform: template
    switches:
      movie_mode:
        friendly_name: "Movie Mode"
        value_template: >
          {{ is_state('input_boolean.moviemode', 'on') }}
        turn_on:
          - service: input_boolean.turn_on
            entity_id: input_boolean.moviemode
          - service: script.moviemode_on
        turn_off:
          - service: input_boolean.turn_off
            entity_id: input_boolean.moviemode
          - service: script.moviemode_off 
      video_input:
        friendly_name: "Video Input"
        value_template: >
          {{ is_state('input_boolean.videoinput', 'on') }}
        turn_on:
          - service: input_boolean.turn_on
            entity_id: input_boolean.videoinput
          - service: script.turn_on
            entity_id: script.audiolab_video
          - service: input_boolean.turn_off
            entity_id: input_boolean.audioinput
        turn_off:
          - service: input_boolean.turn_on
            entity_id: input_boolean.audioinput
          - service: script.turn_on
            entity_id: script.audiolab_audio
          - service: input_boolean.turn_off
            entity_id: input_boolean.videoinput
      audio_input:
        friendly_name: "Audio Input"
        value_template: >
          {{ is_state('input_boolean.audioinput', 'on') }}
        turn_on:
          - service: input_boolean.turn_on
            entity_id: input_boolean.audioinput
          - service: script.turn_on
            entity_id: script.audiolab_audio
          - service: input_boolean.turn_off
            entity_id: input_boolean.videoinput
        turn_off:
          - service: input_boolean.turn_on
            entity_id: input_boolean.videoinput
          - service: script.turn_on
            entity_id: script.audiolab_video
          - service: input_boolean.turn_off
            entity_id: input_boolean.audioinput


