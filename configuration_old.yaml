homeassistant:
  # Name of the location where Home Assistant is running
  name: !secret hass_property_name
  latitude: !secret hass_latitude
  longitude: !secret hass_longitude
  elevation: 0
  unit_system: metric
  time_zone: !secret hass_timezone

  # Customization file
  customize: !include customize.yaml

# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

# Uncomment this if you are using SSL/TLS, running in Docker container, etc.
http:
  base_url: hass.witkowski.ovh
  use_x_forwarded_for: true
  trusted_proxies: 10.0.0.1

api:

mqtt:
  discovery: true
  broker: 192.168.0.5
  birth_message:
    topic: 'hass/status'
    payload: 'online'
  will_message:
    topic: 'hass/status'
    payload: 'offline'

# google assistant
google_assistant:
  project_id: vibohass
  service_account: !include vibohass_service.json
  report_state: true
  exposed_domains:
    - switch
    - light
  entity_config:  
    switch.reboot_garage_sonoff:
      expose: false
    switch.kitchen_light_01:
      expose: false
    switch.audiolab_optical:
      expose: false
    switch.audiolab_video:
      expose: false
    switch.audiolab_coaxial:
      expose: false
    switch.mini01:
      expose: false
    switch.mini02:
      expose: false
    switch.mini03:
      expose: false
    switch.mini04:
      expose: false
    switch.mini05:
      expose: false
    switch.mini06:
      expose: false
    switch.mini07:
      expose: false
    switch.mini08:
      expose: false
    

# Text to speech
tts:
  - platform: google_translate

telegram_bot:
  - platform: broadcast
    api_key: !secret telegram_bot_key
    allowed_chat_ids: !secret telegram_bot_main_chat_id

spotify:
  client_id: !secret hass_spotify_client_id
  client_secret: !secret hass_spotify_client_secret

spotcast:
  sp_dc: !secret sp_dc
  sp_key: !secret sp_key


