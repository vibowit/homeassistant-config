---
substitutions:
  device: livingroom_rfbridge
  name: "Living Room RFBridge"
  reboot_timeout: 2d
  update_interval: 5min

esphome:
  name: ${device}
  platform: ESP8266
  board: esp01_1m

<<: !include common/common.yaml
# Enable logging
logger:
  baud_rate: 0
  
web_server:
  port: 80

api:
  services:
    - service: screen_up
      then:
        - rf_bridge.send_raw:
            raw: AAB04B04080276014000D210D6B081A081A0A0A08181A0A0A0A0A0A0A0A0A0A0A090A0A0A0A0A081908181A0A0A0A081A08181A0A081A0A0A0A0A0A0A0A0A0A0A0A081A0818181A081818181A0A055
        - rf_bridge.send_raw:
            raw: 0
    - service: screen_down
      then:
        - rf_bridge.send_raw:
            raw: AAB04D0508026C014A00C8008C10FEC081A081A0A0A08181A0A0A0A0A0A0A0A0A0A0A0A0A0A0A0A0A081A08181A0A0A0A081A08181A0A081A0A0A0A0A0A0A0A0A081A0A0A0A0818181818181A081B0A055
        - rf_bridge.send_raw:
            raw: 0

    - service: send_rf_raw
      variables:
        raw: string
      then:
        - rf_bridge.send_raw:
            raw: !lambda 'return raw;'

    - service: send_rf_code
      variables:
        sync: int
        low: int
        high: int
        code: int
      then:
        - rf_bridge.send_code:
            sync: !lambda 'return sync;'
            low: !lambda 'return low;'
            high: !lambda 'return high;'
            code: !lambda 'return code;'
    - service: send_advanced_rf_code
      variables:
        length: int
        protocol: int
        code: int
      then:
        - rf_bridge.send_advanced_code:
            length: !lambda 'return length;'
            protocol: !lambda 'return protocol;'
            code: lambda! 'return code;'
                
    - service: learn
      then:
        - rf_bridge.learn
    - service: start_advanced_sniffing
      then:
        - rf_bridge.start_advanced_sniffing
        - lambda: |-
            ESP_LOGD("main", "Advanced sniffing started");
    - service: stop_advanced_sniffing
      then:
        - rf_bridge.stop_advanced_sniffing
        - lambda: |-
            ESP_LOGD("main", "Advanced sniffing stopped");

sensor:
  - platform: wifi_signal
    name: ${device} Wifi Signal Strength
    update_interval: 60s
  - platform: uptime
    name: ${device} Uptime

# Device Specific Config

binary_sensor:
  - platform: status
    name: ${name} Status

status_led:
  pin:
    number: GPIO13
    inverted: yes
    
uart:
  tx_pin: 1
  rx_pin: 3
  baud_rate: 19200

rf_bridge:
  on_code_received:
    then:
      - homeassistant.event:
          event: esphome.rf_code_received
          data:
            sync: !lambda 'char buffer [10];return itoa(data.sync,buffer,16);'
            low: !lambda 'char buffer [10];return itoa(data.low,buffer,16);'
            high: !lambda 'char buffer [10];return itoa(data.high,buffer,16);'
            code: !lambda 'char buffer [10];return itoa(data.code,buffer,16);'
      - lambda: |-
          ESP_LOGD("main", "Simple code received");
  
  on_advanced_code_received:
    then:
      - homeassistant.event:
          event: esphome.rf_advanced_code_received
          data:
            length: !lambda 'char buffer [10];return itoa(data.length,buffer,16);'
            protocol: !lambda 'char buffer [10];return itoa(data.protocol,buffer,16);'
            code: !lambda 'return data.code;'
      - lambda: |-
          ESP_LOGD("main", "Advanced code received");